<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Seite nicht gefunden</title>
    <meta name="description" content="Die angeforderte Seite wurde leider nicht gefunden.">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/v4-shims.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="assets/js/components.js"></script>
</head>

<body>
    <a href="#main-content" class="skip-link">
        <span lang="de">Zum Inhalt springen</span>
        <span lang="en">Skip to content</span>
    </a>

    <div id="site-header"></div>
    <div id="site-nav"></div>

    <main id="main-content" class="main-container">
        <div class="error-page">
            <div class="error-code">404</div>
            <h1 style="margin-bottom: 1rem;">
                <span lang="de">Seite nicht gefunden</span>
                <span lang="en">Page Not Found</span>
            </h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                <span lang="de">Die von dir angeforderte Seite existiert leider nicht oder wurde verschoben.</span>
                <span lang="en">The page you requested does not exist or has been moved.</span>
            </p>
            <a href="home.html" class="btn-primary" style="display: inline-block; width: auto; text-decoration: none; padding: 0.75rem 2rem;">
                <i class="fa fa-home" aria-hidden="true"></i>
                <span lang="de">Zur Startseite</span>
                <span lang="en">Go to Homepage</span>
            </a>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="assets/js/main.js"></script>
</body>

</html>
