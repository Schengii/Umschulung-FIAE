<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willkommen - Umschulung IT</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Zum Inhalt springen</a>

    <header>
        <h1>Portfolio Umschulung zum Fachinformatiker</h1>
    </header>

    <main id="main-content" class="main-container">
        <div class="welcome-container card">
            <h1 id="myH1">Willkommen</h1>
            <p>Bitte gib deinen Namen ein, um das Dashboard zu personalisieren.</p>
            
            <div class="form-group" style="margin-top: 1.5rem;">
                <label for="myText">Name / Benutzername</label>
                <input type="text" id="myText" class="form-control" placeholder="z. B. Max Mustermann" autocomplete="name">
            </div>
            
            <button id="mySubmit" class="btn-primary" style="margin-bottom: 1.5rem;">Eintreten</button>
            
            <div class="card" style="margin-top: 2rem; background: var(--bg-page); border-style: dashed; padding: 1rem;">
                <h3>Direkt zum Dashboard</h3>
                <p style="font-size: 0.9rem; margin-bottom: 0.75rem;">Du kannst die Personalisierung auch überspringen.</p>
                <a href="home.html" class="btn-primary" style="display: block; text-decoration: none; padding: 0.5rem 1rem; text-align: center; background-color: var(--text-secondary);">Dashboard öffnen</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Maximilian Schenk; Rüdesheimer Str. 14; 53175 Bonn; Germany</p>
        <div class="icons">
            <a href="#" aria-label="Facebook"><i class="fa fa-facebook" aria-hidden="true"></i></a>
            <a href="#" aria-label="Twitter"><i class="fa fa-twitter" aria-hidden="true"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa fa-instagram" aria-hidden="true"></i></a>
            <a href="#" aria-label="LinkedIn"><i class="fa fa-linkedin" aria-hidden="true"></i></a>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>

</html>
